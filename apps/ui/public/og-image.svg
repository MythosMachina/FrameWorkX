<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">FrameWorkX</title>
  <desc id="desc">LoRA Training, Image Generation and Public Model Gallery</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#261a11" />
      <stop offset="100%" stop-color="#110d09" />
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="#c77b3a" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#c77b3a" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="40" y="40" width="1120" height="550" rx="18" ry="18" fill="none" stroke="#d2a15f" stroke-opacity="0.45" />
  <text x="90" y="190" fill="#f0dfc4" font-family="Cinzel, Georgia, serif" font-size="70" letter-spacing="1">FrameWorkX</text>
  <text x="90" y="265" fill="#d6bb8e" font-family="Georgia, serif" font-size="34">LoRA Training</text>
  <text x="90" y="315" fill="#d6bb8e" font-family="Georgia, serif" font-size="34">Image Generation</text>
  <text x="90" y="365" fill="#d6bb8e" font-family="Georgia, serif" font-size="34">Public Model Gallery</text>
  <text x="90" y="450" fill="#ad8f62" font-family="Georgia, serif" font-size="26">
    Train, generate, and publish public models and images in one platform.
  </text>
</svg>
